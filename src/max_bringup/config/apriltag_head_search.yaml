apriltag_detector_node:
  ros__parameters:
    camera_index: 0
    frame_width: 640
    frame_height: 480
    fps: 30.0
    gstreamer_pipeline: ''
    use_camera_topic: false
    publish_debug_image: true
    tag_family: 'tag36h11'
    nthreads: 2
    quad_decimate: 2.0
    quad_sigma: 0.0
    decode_sharpening: 0.25
    refine_edges: true

cm550_remocon_bridge_node:
  ros__parameters:
    port: '/dev/ttyACM0'
    baudrate: 57600
    serial_timeout_sec: 0.05
    write_delay_sec: 0.02
    resend_same_motion_command: false
    resend_same_aux_command: false
    command_topic: '/max/motion_cmd'
    page_topic: '/max/motion_page_cmd'
    status_topic: '/max/motion_status'
    last_page_topic: '/max/motion_last_page'
    command_map: 'stop:1,idle:1,turn_left:50,spin_left:50,turn_right:51,spin_right:51,stand:1,walk:103,reverse:158'
    command_sequences: 'walk:101|103,reverse:156|158'
    sequence_step_delay_sec: 0.8
    ignore_unknown_commands: true
    strip_action_metadata: true
    head_raw_topic: '/max/head_cmd_raw'
    head_angle_topic: '/max/head_cmd'
    head_preset_topic: '/max/head_preset'
    head_status_topic: '/max/head_cmd_sent'
    center_raw: 512
    min_raw: 344
    max_raw: 680
    radians_per_range: 1.5708
    preset_map: 'center:512,left:680,right:344'
    led_preset_topic: '/max/led_preset'
    led_raw_topic: '/max/led_cmd_raw'
    led_status_topic: '/max/led_cmd_sent'
    led_preset_map: 'off:20000,red:20001,blue:20002,magenta:20003'

apriltag_head_search_node:
  ros__parameters:
    detections_topic: '/max/apriltag_detections'
    head_raw_topic: '/max/head_cmd_raw'
    head_preset_topic: '/max/head_preset'
    led_topic: '/max/led_preset'
    motion_topic: '/max/motion_cmd'
    status_topic: '/max/head_search_status'
    target_tag_id: -1
    detection_timeout: 0.5
    control_rate: 8.0
    head_dead_zone_px: 20.0
    head_step_raw: 8
    body_dead_zone: 0.12
    body_assist_threshold: 120
    body_motion_cooldown_sec: 1.2
    center_head_on_detect: false
    center_head_when_body_turns: true
    search_motion_enabled: false
    search_motion_command: 'turn_left'
    distance_control_enabled: true
    target_size_px: 90.0
    size_tolerance_px: 15.0
    forward_motion_command: 'walk'
    reverse_motion_command: 'reverse'
    search_led_command: 'red'
    tracking_led_command: 'blue'
    centered_led_command: 'magenta'
    lost_led_command: 'off'
    scan_min_raw: 344
    scan_max_raw: 680
    scan_step_raw: 18
    scan_start_raw: 512
    scan_pause_sec: 0.15
