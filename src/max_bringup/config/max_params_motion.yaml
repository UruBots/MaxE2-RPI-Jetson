detector_node:
  ros__parameters:
    camera_index: 0
    frame_width: 640
    frame_height: 480
    fps: 30.0
    lower_h: 0
    lower_s: 120
    lower_v: 70
    upper_h: 10
    upper_s: 255
    upper_v: 255
    lower_h2: 170
    upper_h2: 180
    use_second_range: true
    min_contour_area: 500
    publish_debug_image: true
    gstreamer_pipeline: ''

shape_detector_node:
  ros__parameters:
    camera_index: 0
    frame_width: 640
    frame_height: 480
    fps: 30.0
    gstreamer_pipeline: ''
    publish_debug_image: true
    use_camera_topic: false
    lower_h: 0
    lower_s: 80
    lower_v: 80
    upper_h: 180
    upper_s: 255
    upper_v: 255
    min_contour_area: 800
    max_contour_area: 100000
    blur_kernel: 5
    morph_kernel: 5
    circularity_threshold: 0.7
    square_aspect_threshold: 0.25
    approx_epsilon_ratio: 0.03
    target_shape: ''

line_detector_node:
  ros__parameters:
    camera_index: 0
    frame_width: 640
    frame_height: 480
    fps: 30.0
    gstreamer_pipeline: ''
    publish_debug_image: true
    use_camera_topic: false
    roi_height_ratio: 0.35
    threshold_mode: 'adaptive'
    binary_threshold: 60
    adaptive_block_size: 25
    adaptive_c: 8
    invert_binary: true
    blur_kernel: 5
    morph_kernel: 5
    min_line_area: 200
    use_hsv: false
    line_lower_h: 0
    line_lower_s: 0
    line_lower_v: 0
    line_upper_h: 180
    line_upper_s: 50
    line_upper_v: 80

tracker_node:
  ros__parameters:
    linear_speed: 0.15
    angular_gain: 1.0
    dead_zone: 0.08
    min_area: 1000
    max_area: 50000
    distance_control_enabled: true
    target_area: 12000
    area_tolerance: 2500
    control_rate: 30.0
    timeout: 0.5
    search_enabled: false
    search_angular_speed: 0.3
    output_mode: 'motion'
    motion_topic: '/max/motion_cmd'
    head_raw_topic: '/max/head_cmd_raw'
    led_topic: '/max/led_preset'
    forward_command: 'walk'
    left_command: 'turn_left'
    right_command: 'turn_right'
    reverse_command: 'reverse'
    stop_command: 'stop'
    search_command: 'turn_left'
    head_tracking_enabled: true
    search_head_enabled: true
    search_led_command: 'red'
    tracking_led_command: 'blue'
    centered_led_command: 'magenta'
    lost_led_command: 'off'
    head_dead_zone_px: 20.0
    head_step_raw: 8
    head_min_raw: 344
    head_max_raw: 680
    head_center_raw: 512
    head_search_step_raw: 18
    head_search_pause_sec: 0.15
    body_assist_threshold: 120
    body_motion_cooldown_sec: 1.2
    center_head_when_body_turns: true

line_tracker_node:
  ros__parameters:
    linear_speed: 0.12
    angular_gain: 1.5
    angle_gain: 0.01
    dead_zone: 0.05
    control_rate: 30.0
    timeout: 0.5
    lost_angular_speed: 0.4
    lost_behavior: 'stop'
    output_mode: 'motion'
    motion_topic: '/max/motion_cmd'
    forward_command: 'walk'
    left_command: 'turn_left'
    right_command: 'turn_right'
    stop_command: 'stop'
    search_left_command: 'turn_left'
    search_right_command: 'turn_right'

apriltag_detector_node:
  ros__parameters:
    camera_index: 0
    frame_width: 640
    frame_height: 480
    fps: 30.0
    gstreamer_pipeline: ''
    use_camera_topic: false
    publish_debug_image: true
    tag_family: 'tag36h11'
    nthreads: 2
    quad_decimate: 2.0
    quad_sigma: 0.0
    decode_sharpening: 0.25
    refine_edges: true

action_executor_node:
